# ─────────────────────────────────────────────────────────────────────────────
# Nginx server block for the DEVELOP environment.
#
# Serves the React SPA deployed by .github/workflows/deploy-develop.yml to
# /var/www/mana-community-dev, and proxies API + WebSocket traffic to the
# backend running on the same Lightsail host.
#
# Install on the server:
#   sudo cp mana-community-dev.conf /etc/nginx/sites-available/mana-community-dev
#   sudo ln -s /etc/nginx/sites-available/mana-community-dev /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add TLS (see deploy/nginx/README-dev-nginx.md).
#
# EDIT BEFORE USE:
#   - server_name: set to your real dev hostname (DNS A record -> Lightsail IP).
#   - backend port: 8080 assumes develop shares the prod backend. If you run a
#     SEPARATE dev backend, change every :8080 below to that port (e.g. 8081).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;

    server_name dev.manacommunity.example;   # <-- CHANGE to your dev hostname

    root /var/www/mana-community-dev;
    index index.html;

    # Reasonable upload ceiling (bulk uploads, images, etc.)
    client_max_body_size 25m;

    # ── Static assets: long cache (filenames are content-hashed by Vite) ──────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── REST API -> Spring Boot (path is NOT rewritten; backend serves /api) ──
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── STOMP / WebSocket handshake -> Spring's /ws (needs upgrade headers) ───
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # keep long-lived sockets open
    }

    # ── SPA fallback: React Router routes resolve to index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip for text assets (safe defaults; ignored if already enabled globally)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
